name: Update Markdown TOC

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  update-toc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci
        working-directory: .github/actions/toc-action || .

      - name: Run TOC updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node .github/actions/toc-action/insert-toc.js \
            --files "${{ inputs_files }}" \
            --collapsed "${{ inputs_collapsed }}"
        shell: bash

      - name: Commit changed files
        if: ${{ steps.update_toc.outcome == 'success' || always() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Table of Contents"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
